
<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trading Checklist</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.container{max-width:900px;margin:30px auto;padding:20px}
.card{background:#1e293b;border-radius:16px;padding:20px;margin:16px 0;box-shadow:0 8px 20px rgba(0,0,0,.3)}
h1{text-align:center}.progress{height:18px;background:#334155;border-radius:10px;overflow:hidden}
.bar{height:100%;width:0;background:#22c55e;transition:.3s}
label{display:block;margin:10px 0}textarea{width:100%;height:120px;background:#0f172a;color:#fff;border:1px solid #475569;border-radius:8px;padding:10px}
button{background:#22c55e;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer}
</style></head><body><div class="container">
<h1>Trading Checklist</h1>
<div class="card"><div class="progress"><div class="bar" id="bar"></div></div><p id="pct">0% Complete</p></div>
<div class="card">
<h2>Pre-Trade</h2>
<label><input class="c" type="checkbox"> Trend confirmed</label>
<label><input class="c" type="checkbox"> Support/Resistance marked</label>
<label><input class="c" type="checkbox"> Risk:Reward ≥ 1:2</label>
<label><input class="c" type="checkbox"> Entry confirmed</label>
<label><input class="c" type="checkbox"> Stop loss set</label>
<label><input class="c" type="checkbox"> Position size calculated</label>
</div>
<div class="card"><h2>Trade Journal</h2><textarea id="notes" placeholder="Write notes..."></textarea><br><br><button onclick="save()">Save Notes</button></div>
</div>
<script>
const c=[...document.querySelectorAll('.c')];
function upd(){let d=c.filter(x=>x.checked).length,p=Math.round(d/c.length*100);bar.style.width=p+'%';pct.textContent=p+'% Complete';localStorage.setItem('checks',JSON.stringify(c.map(x=>x.checked)));}
c.forEach(x=>x.onchange=upd);
function save(){localStorage.setItem('notes',notes.value);alert('Saved');}
let s=JSON.parse(localStorage.getItem('checks')||'[]');c.forEach((x,i)=>x.checked=!!s[i]);notes.value=localStorage.getItem('notes')||'';upd();
</script></body></html>
