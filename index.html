<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Checklist</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#101827;
color:#fff;
padding:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

.card{
background:#1c2435;
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card-header{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.score{
color:#27e39c;
font-size:28px;
font-weight:bold;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:15px 0;
}

.switch{
position:relative;
display:inline-block;
width:55px;
height:28px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#444;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:22px;
width:22px;
left:3px;
bottom:3px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:#20d997;
}

input:checked + .slider:before{
transform:translateX(27px);
}

.summary{
background:#1c2435;
padding:20px;
border-radius:15px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#20d997;
}
</style>

</head>

<body>

<h1>Trade Checklist</h1>

<div class="card" data-weight="10">

<div class="card-header">
<h2>Weekly</h2>
<div class="score">0%</div>
</div>

<div class="item">
<span>Trend</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>AOI Rejection</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>EMA Touch</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>Previous Structure</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

</div>


<div class="card">

<div class="card-header">
<h2>Daily</h2>
<div class="score">0%</div>
</div>

<div class="item">
<span>Trend</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>AOI</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>EMA</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>Rejection</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

</div>


<div class="card">

<div class="card-header">
<h2>4H</h2>
<div class="score">0%</div>
</div>

<div class="item">
<span>Trend</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>EMA</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>AOI</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

</div>

<div class="summary">
Overall Score:
<span id="overall">0%</span>
</div>

<script>

const cards=document.querySelectorAll(".card");

function update(){

let total=0;
let sections=0;

cards.forEach(card=>{

const checks=card.querySelectorAll("input");

let checked=0;

checks.forEach(c=>{
if(c.checked) checked++;
});

let percent=Math.round((checked/checks.length)*100);

card.querySelector(".score").innerHTML=percent+"%";

total+=percent;

sections++;

});

document.getElementById("overall").innerHTML=Math.round(total/sections)+"%";

}

document.querySelectorAll("input").forEach(i=>{

i.addEventListener("change",update);

});

</script>

</body>
</html>
